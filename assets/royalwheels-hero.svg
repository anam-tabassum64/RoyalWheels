  <path d="M116 326C224 292 320 286 454 302" stroke="#8FB6E8" stroke-opacity="0.2" stroke-width="3" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="95" y="78" width="470" height="264" rx="28" fill="#0B1525" fill-opacity="0.72" stroke="#FFFFFF" stroke-opacity="0.08"/>
    <rect x="95" y="78" width="470" height="264" rx="28" fill="url(#accent)" fill-opacity="0.05"/>
  </g>

  <text x="138" y="156" fill="#F8FAFC" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="52" font-weight="800" letter-spacing="0.5">
    RoyalWheels
  </text>
  <text x="138" y="198" fill="#F5C96A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="3">
