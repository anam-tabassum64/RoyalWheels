  </text>
  <text x="138" y="242" fill="#D6E3F5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="400">
    Rent cars and bikes online with partner dashboards,
  </text>
  <text x="138" y="268" fill="#D6E3F5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="400">
    cloud deployment, and production-grade monitoring.
  </text>

  <g>
