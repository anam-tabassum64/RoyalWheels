<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RoyalWheels Hero Banner</title>
  <desc id="desc">A modern blue and gold hero banner for the RoyalWheels vehicle rental platform.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.52" stop-color="#0E1B31"/>
      <stop offset="1" stop-color="#142A4A"/>
    </linearGradient>
    <linearGradient id="accent" x1="420" y1="60" x2="1180" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F5C96A"/>
      <stop offset="1" stop-color="#E38B2D"/>
    </linearGradient>
    <linearGradient id="car" x1="520" y1="190" x2="1120" y2="310" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#B8C7DD"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1600" height="420" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="420" rx="34" fill="url(#bg)"/>
  <circle cx="1270" cy="72" r="140" fill="#2C5D9E" fill-opacity="0.18"/>
  <circle cx="300" cy="68" r="100" fill="#F5C96A" fill-opacity="0.12"/>
  <circle cx="1380" cy="320" r="180" fill="#F5C96A" fill-opacity="0.08"/>
  <path d="M0 314C180 274 304 284 456 310C590 334 724 346 842 330C985 310 1104 248 1278 240C1406 234 1514 254 1600 280V420H0V314Z" fill="#09111D"/>
