    <rect x="262" y="292" width="112" height="34" rx="17" fill="#8FB6E8" fill-opacity="0.16" stroke="#8FB6E8" stroke-opacity="0.5"/>
    <text x="289" y="315" fill="#D7E6FB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">AWS EKS</text>
    <rect x="386" y="292" width="112" height="34" rx="17" fill="#9CE0C2" fill-opacity="0.14" stroke="#9CE0C2" stroke-opacity="0.45"/>
    <text x="410" y="315" fill="#D7FAE7" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">Grafana</text>
  </g>

