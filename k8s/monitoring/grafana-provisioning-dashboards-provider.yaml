apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning-dashboards
  namespace: royalwheels
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'royalwheels-dashboards'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        options:
          path: /var/lib/grafana/dashboards
